<form class="midi-config">

  <div id="mappings" class="mapping-list">
    {{#each mappings}}
      <div class="mapping-row">

        <input class="key" type="text" value="{{this.key}}" placeholder="cc-1 / note-60"/>

        <select class="type">
          <option value="macro" {{#if (eq this.type "macro")}}selected{{/if}}>Macro</option>
          <option value="scene" {{#if (eq this.type "scene")}}selected{{/if}}>Scene</option>
          <option value="roll" {{#if (eq this.type "roll")}}selected{{/if}}>Roll</option>
          <option value="volume" {{#if (eq this.type "volume")}}selected{{/if}}>Volume</option>
        </select>

        <div class="field">
          <select class="macro-select">
            {{#each ../macros}}
              <option value="{{this}}">{{this}}</option>
            {{/each}}
          </select>
        </div>

        <div class="field">
          <select class="scene-select">
            {{#each ../scenes}}
              <option value="{{this}}">{{this}}</option>
            {{/each}}
          </select>
        </div>

        <div class="field">
          <input class="roll-input" type="text" value="{{this.value}}" placeholder="1d20+5"/>
        </div>

        <div class="field">
          <select class="volume-target">
            <option value="master">Master</option>
            <option value="music">Music</option>
            <option value="ambient">Ambient</option>
          </select>
        </div>

        <button type="button" class="learn-btn">🎯</button>
        <button type="button" class="delete-btn">✕</button>

      </div>
    {{/each}}
  </div>

  <!-- Template for new rows -->
  <template id="row-template">
    <div class="mapping-row">
      <input class="key" type="text" placeholder="cc-1 / note-60"/>

      <select class="type">
        <option value="macro">Macro</option>
        <option value="scene">Scene</option>
        <option value="roll">Roll</option>
        <option value="volume">Volume</option>
      </select>

      <div class="field">
        <select class="macro-select"></select>
      </div>

      <div class="field">
        <select class="scene-select"></select>
      </div>

      <div class="field">
        <input class="roll-input" type="text" placeholder="1d20+5"/>
      </div>

      <div class="field">
        <select class="volume-target">
          <option value="master">Master</option>
          <option value="music">Music</option>
          <option value="ambient">Ambient</option>
        </select>
      </div>

      <button type="button" class="learn-btn">🎯</button>
      <button type="button" class="delete-btn">✕</button>
    </div>
  </template>

  <div class="controls">
    <button type="button" id="add-mapping">+ Add Mapping</button>
    <button type="button" id="save">💾 Save</button>
  </div>

</form>
